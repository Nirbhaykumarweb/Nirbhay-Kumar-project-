<!DOCTYPE html>
<html>
<head>
    <title>User Form</title>
</head>
<body>
  <form>
     
          
               <fieldset>
                   <legend>
                       <h2>USER FORM
                       </h2>
                       </legend>   
              <b>
<table width=100%>

<tr>
    <td>FIRST NAME</td>
    <td><input type="text" name="fname"></td>
</tr>

<tr>
    <td>PASSWORD</td>
    <td><input type="password" name="pass"></td>
</tr>

<tr>
    <td>GENDER</td>
    <td>
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female
    </td>
</tr>

<tr>
    <td>ADDRESS</td>
    <td>
        <textarea rows="4" cols="20"></textarea>
    </td>
</tr>

<tr>
    <td>D.O.B</td>
    <td>
        <input type="date">
    </td>
</tr>

<tr>
    <td>SELECT GAMES</td>
    <td>
        <input type="checkbox"name="check1"> Hockey
        <input type="checkbox"check2> Football
        <input type="checkbox"check3> Cricket
        <input type="checkbox"check4> VolleyBall
    </td>
</tr>

<tr>
    <td>MARITAL STATUS</td>
    <td>
        <input type="radio" name="status"> Married
        <input type="radio" name="status"> Unmarried
    </td>
</tr>

</tr>

<tr>
    <td colspan="2" align="center">
        <input type="submit" value="Submit">
        <input type="reset" value="Reset">
    </td>
</tr>
  
<tr>
    <td colspan="2"align=center>
        <input type="checkbox"> I accept this agreement
    </td>

</table>

</form>
  </b>
  </fieldset>

</body>
</html>
